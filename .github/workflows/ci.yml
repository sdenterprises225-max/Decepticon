name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - LICENSE
      - docs/**
      - assets/**
      - .gitignore
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - LICENSE
      - docs/**
      - assets/**
      - .gitignore

permissions:
  contents: read

jobs:
  # Compute which areas of the repo were touched. Downstream jobs gate on
  # these so a Go-only or docs-only change doesn't run the entire suite.
  # Any change to ci.yml itself triggers everything (safety net).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.app.outputs.python }}
      cli: ${{ steps.app.outputs.cli }}
      web: ${{ steps.app.outputs.web }}
      launcher: ${{ steps.app.outputs.launcher }}
      compose: ${{ steps.app.outputs.compose }}
      docker-images: ${{ steps.docker.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: app
        with:
          filters: |
            python:
              - 'packages/decepticon/**'
              - 'packages/decepticon-core/**'
              - 'packages/decepticon-sdk/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            cli:
              - 'clients/cli/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            web:
              - 'clients/web/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            launcher:
              - 'clients/launcher/**'
              - '.github/workflows/ci.yml'
            compose:
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
      # Per-image filter: filter name == image name so the matrix can pull
      # `outputs.changes` directly as the list of images to build.
      - uses: dorny/paths-filter@v3
        id: docker
        with:
          filters: |
            langgraph:
              - 'containers/langgraph.Dockerfile'
              - 'packages/decepticon/**'
              - 'packages/decepticon-core/**'
              - 'packages/decepticon-sdk/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            litellm:
              - 'containers/litellm.Dockerfile'
              - 'config/litellm.yaml'
              - '.github/workflows/ci.yml'
            sandbox:
              - 'containers/sandbox.Dockerfile'
              # Skills no longer ship in the sandbox image — they live under
              # packages/decepticon/src/decepticon/skills and are read
              # in-process by the langgraph service (see
              # packages/decepticon/src/decepticon/backends/__init__.py).
              # Skill changes rebuild langgraph (via the packages/decepticon/**
              # filter above), not the sandbox.
              - '.github/workflows/ci.yml'
            cli:
              - 'containers/cli.Dockerfile'
              - 'clients/cli/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            web:
              - 'containers/web.Dockerfile'
              - 'clients/web/**'
              - 'clients/cli/**'
              - 'clients/shared/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            c2-sliver:
              - 'containers/c2-sliver.Dockerfile'
              - '.github/workflows/ci.yml'

  # ── Compose validation guardrail ─────────────────────────────────
  # Closes #215. Catches docker-compose YAML drift early: if a future
  # PR breaks YAML validity or adds a service to the dev override that
  # does not exist in base, this job fails fast. Cheap enough to run on
  # every PR even though the path filter only triggers it on
  # ``docker-compose*.yml`` edits.
  compose-validate:
    name: Compose YAML validate
    needs: changes
    if: ${{ needs.changes.outputs.compose == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The compose files reference a project-local ``.env`` for the
      # runtime stack. CI doesn't ship one (and shouldn't — keys live
      # in the user's $DECEPTICON_HOME), so the validator runs against
      # an empty .env so it only catches YAML/structure drift.
      - name: Stub empty .env for config-only validation
        run: touch .env
      - name: Validate base docker-compose.yml
        run: docker compose -f docker-compose.yml config > /dev/null
      - name: Validate base + dev override
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config > /dev/null
      - name: Validate base + dev + watch
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.watch.yml config > /dev/null

  python:
    # Matrix runs the full lint + typecheck + test suite on Linux and macOS.
    # `shell: bash` is forced on every step so identical scripts run on both
    # runners. Windows runner is intentionally deferred until the Windows
    # test-suite fixes from #279 land — adding it here without those fixes
    # would put the CI red on every PR. Track in #279.
    name: Python (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Cache the resolved virtualenv across runs. setup-uv's enable-cache
      # only caches the uv binary's HTTP cache, not the materialized .venv,
      # so a cold uv sync still rebuilds the env every time. Keying on
      # uv.lock + pyproject.toml + python version means the cache is only
      # invalidated when dependencies actually change.
      - name: Cache .venv
        id: venv-cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.13-${{ hashFiles('uv.lock', 'pyproject.toml') }}
      - run: uv sync --dev --locked
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: basedpyright (errors only)
        run: |
          # Fail on errors only — pre-existing warnings on langchain dynamic
          # interfaces are tracked but non-blocking. Ratchet up over time.
          uv run basedpyright --outputjson > bp.json || true
          uv run python -c "
          import json, sys
          d = json.load(open('bp.json'))
          s = d['summary']
          print(f\"basedpyright: {s['errorCount']} errors, {s['warningCount']} warnings, {s['informationCount']} info\")
          if s['errorCount']:
              print()
              print('=== error-level diagnostics ===')
              for diag in d.get('generalDiagnostics', []):
                  if diag.get('severity') != 'error':
                      continue
                  loc = diag.get('range', {}).get('start', {})
                  line = loc.get('line', 0)
                  if isinstance(line, int):
                      line += 1
                  print(f\"  {diag.get('file', '?')}:{line}\")
                  print(f\"    {diag.get('message', '')}\")
                  if diag.get('rule'):
                      print(f\"    rule: {diag['rule']}\")
              sys.exit(1)
          "
      - name: Upload basedpyright JSON (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: basedpyright-${{ github.run_id }}
          path: /tmp/bp.json
          retention-days: 7
      # PRs run tests without coverage instrumentation — coverage adds ~3x
      # runtime and PR feedback latency matters more than coverage tracking
      # on every change. Coverage is enforced on main pushes (next step).
      - name: Pytest (PRs — fast, no coverage)
        if: github.event_name == 'pull_request'
        # Deselect tests marked `slow` (e.g. benchmark/test_harness wall-clock
        # timeout cases) so PR feedback stays under a minute. Main coverage
        # lane below still runs them.
        run: uv run pytest -n auto -q -m "not slow"
      - name: Pytest with coverage (Linux push — full suite, enforces threshold)
        if: github.event_name == 'push' && runner.os == 'Linux'
        run: uv run pytest -n auto --cov --cov-report=xml --cov-report=term --cov-fail-under=30
      - name: Pytest cross-platform sanity (macOS push — skip docker-bound slow tests)
        # macOS GitHub runners don't have Docker installed; the harness's
        # `slow` tests call `docker compose restart sandbox` directly and
        # fail there. The PR fast lane already deselects `slow`; mirror
        # that on push so macOS validates cross-platform Python without
        # blocking main on Docker availability. Linux remains the canonical
        # coverage lane (full suite + threshold).
        if: github.event_name == 'push' && runner.os == 'macOS'
        run: uv run pytest -n auto -q -m "not slow"
      - name: Upload coverage artifact
        if: github.event_name == 'push' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.os }}
          path: coverage.xml
          if-no-files-found: ignore

  cli:
    # Matrix mirrors the python job — Linux + macOS. Windows runner is
    # deferred until the cli test suite is verified on Windows in a
    # follow-up PR (the launcher already runs on Windows below since
    # platform/system.go introduces the OS-specific code in this PR).
    name: CLI (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # ── rollup native-binary workaround for npm/cli#4828 ────────────
      # `npm ci` from a Linux-generated lock file silently skips the
      # platform-specific optional deps that rollup uses for its native
      # parser. vitest (rollup-based) then crashes at startup on
      # macOS/Windows with `Cannot find module @rollup/rollup-<os>-<arch>`.
      # Force-install the matching binary so the lock file stays
      # canonical but the test runner can resolve its native dep.
      - name: Repair rollup native binary on non-Linux runners
        if: runner.os != 'Linux'
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            macOS-ARM64) npm install --no-save @rollup/rollup-darwin-arm64 ;;
            macOS-X64)   npm install --no-save @rollup/rollup-darwin-x64 ;;
            Windows-X64) npm install --no-save @rollup/rollup-win32-x64-msvc ;;
          esac
      # @decepticon/streaming now ships as a built ESM package
      # (package.json main → dist/index.js). cli's tsc + web's next build
      # resolve the workspace by walking that main, so the dist has to
      # exist before either downstream build runs.
      - name: Build shared streaming workspace
        run: npm run build --workspace=@decepticon/streaming
      - run: cd clients/cli && npm run typecheck
      - name: Run CLI tests
        run: cd clients/cli && npm test --if-present

  web:
    name: Web (lint + build)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Build shared streaming workspace
        run: npm run build --workspace=@decepticon/streaming
      - name: Generate Prisma client
        run: cd clients/web && npx prisma generate
      - name: Lint
        run: cd clients/web && npx eslint src/ --max-warnings 0
      - name: Build
        run: cd clients/web && npm run build
        env:
          NEXT_PUBLIC_DECEPTICON_EDITION: oss

  # Go launcher: vet + test. Mirrors what release.yml runs before GoReleaser
  # builds the binaries on tag push, so a broken `go test ./...` is caught
  # at PR time instead of blocking the release pipeline.
  launcher:
    # Matrix exercises Linux, macOS, and Windows so the OS-specific code
    # paths in internal/platform (Detect, DockerHint, LinuxDistro parser,
    # WSL2 IsWSL branch) and the home-dir resolution in internal/config
    # / internal/compose (HOME vs USERPROFILE) don't regress on any OS.
    # The config/compose tests set both HOME and USERPROFILE so
    # os.UserHomeDir() resolves correctly on every runner, and TempDir
    # delivers an OS-appropriate base path on Windows where /tmp does
    # not exist.
    name: Launcher (${{ matrix.os }})
    needs: changes
    if: needs.changes.outputs.launcher == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: clients/launcher/go.sum
      - name: go vet
        working-directory: clients/launcher
        run: go vet ./...
      - name: go test
        working-directory: clients/launcher
        run: go test ./...

  docker-build:
    name: Docker build (${{ matrix.image }})
    needs: changes
    if: needs.changes.outputs.docker-images != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.changes.outputs.docker-images) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: containers/${{ matrix.image }}.Dockerfile
          push: false
          load: true
          tags: decepticon-${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=${{ github.event_name == 'push' && 'max' || 'min' }}
      # Informational scan. The hotfix scope (1.0.27) keeps this as a
      # SARIF-only artifact while we (a) curate a .trivyignore for the
      # ~20 Go-stdlib / Debian-advisory CRITICAL findings surfaced by
      # this gate and (b) decide whether they need base-image upgrades.
      # Hard-fail enforcement was attempted in this PR but the existing
      # base images (langgraph, cli) ship CRITICAL CVEs that can't be
      # fixed in a hotfix window — moved to a follow-up supply-chain PR.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: decepticon-${{ matrix.image }}:ci
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.sarif
          if-no-files-found: ignore

  # Security scans always run regardless of which paths changed —
  # vulnerability databases update independently of repo state.
  security:
    name: Security (pip-audit + gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pip-audit
        run: uv tool install pip-audit
      - name: Export requirements
        run: uv export --locked --format requirements-txt --no-hashes --no-dev > requirements.txt
      - name: Run pip-audit
        run: uv tool run pip-audit --requirement requirements.txt --ignore-vuln GHSA-xxxx-xxxx-xxxx || true
      # gitleaks-action v2 requires a paid org license; until
      # GITLEAKS_LICENSE is provisioned (or the step is swapped for
      # the binary action / trufflehog) the action exits 1 on the
      # license probe and would block every PR. Hard-fail enforcement
      # for committed secrets is deferred to the follow-up
      # supply-chain PR that handles the license + scanner swap.
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
