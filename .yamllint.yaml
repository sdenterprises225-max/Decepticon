extends: default
rules:
  line-length:
    max: 280
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  truthy:
    check-keys: false
  document-start: disable
  indentation:
    spaces: 2
    indent-sequences: consistent
ignore: |
  node_modules/
  .venv/
  dist/
  build/
  uv.lock
  package-lock.json
  packages/decepticon/decepticon/skills/standard/blue_cell/rules/
